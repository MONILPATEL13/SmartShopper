<html>
<head>
  <title>The Smart Shopper's Guide</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #ffffff, #0562dba6);
      color: rgb(0, 89, 255);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background:linear-gradient(to left right, #ffffff, #0562db);
      padding: 2rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 2px 5px #3f3f3f;
    }
    .btn-custom {
      background-color: rgb(0, 89, 255);
      color: white;
      border-radius: 25px;
      width: 120px;
      font-weight: bold;
      margin: 10px;
    }
    .btn-custom:hover {
      background-color: #0074D9;
      color: rgb(255, 0, 0);
    }
    h2 {
      font-weight: 600;
      margin-bottom: 20px;
      color: rgb(0, 0, 0);
    }
    p {
        color: rgb(0, 0, 0);
    }
  </style>
</head>
<body>
  <div class="card">

    <h2><img src="https://cdn-icons-png.flaticon.com/512/3737/3737372.png" alt="Smart Shopper Logo" width="80" class="mb-3" />THE SMART SHOPPER'S GUIDE</h2>
    <p>NAVIGATE SMART, SHOP EASY</p>
    <div class="d-flex justify-content-center">
        <button class="btn btn-custom" onclick="location.href='{{ url_for('login_page') }}'">SCAN QR</button>

    </div>
    <div class="d-flex justify-content-center">
      <button class="btn btn-custom" onclick="location.href='{{ url_for('login_page') }}'">LOGIN</button>
        <button class="btn btn-custom" onclick="location.href='{{ url_for('register_page') }}'">REGISTER</button>

    </div>
  </div>
</body>
</html>
